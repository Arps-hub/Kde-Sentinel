access_control:
  name: access_control
  requirements:
  - The access control mechanism should be implemented in such a way as to ensure
    that users can only access resources based on their assigned roles. This requires
    defining specific rules regarding user privileges and authorization policies.
    The system must provide mechanisms for managing these rules through an accessible
    interface. Access controls need to consider both internal and external access.
    Furthermore, any changes to access control configurations require proper auditing
    and logging. These requirements apply to all aspects of accessing resources within
    the environment.
  - 'Security Requirements Related To ‘Access_Control’ :'
  - Establish secure authentication methods for worker nodes.
  - Configure kubelets' kubeconfig file permissions to restrict access.
  - Audit access control events regularly.
